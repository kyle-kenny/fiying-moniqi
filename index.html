<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手势控制无人机 </title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #1a1a1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow-x: hidden; /* 防止手机端横向滚动出现白边 */
    }
    
    h2 { 
      font-size: 1.2rem; 
      text-align: center; 
      margin: 15px 0 10px 0; 
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); 
    }

    /* 开始按钮样式 (手机端必须通过用户点击才能启动摄像头) */
    #start-btn {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      color: #1a1a1a;
      background-color: #00ffcc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
      transition: transform 0.1s;
    }
    #start-btn:active { transform: scale(0.95); }
    #controls-container { display: flex; justify-content: center; width: 100%; margin-bottom: 10px; }
    
    /* 视频与画布自适应手机屏幕 */
    #video-container {
      width: 95%; 
      max-width: 640px; 
      position: relative;
      background: #000;
      border-radius: 12px;
      padding: 5px;
      box-sizing: border-box;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }
    video { display: none; }
    canvas {
      width: 100%; 
      height: auto;
      border-radius: 8px;
      background-color: #222;
      display: block;
    }
    
    /* UI 面板：采用你指定的完美布局 */
    #ui-panel {
      width: 95%;
      max-width: 640px;
      margin-top: 15px;
      background: #2c2c2c;
      padding: 15px 20px;
      border-radius: 12px;
      box-sizing: border-box;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    
    .status {
      font-size: 1.2rem; /* 针对手机稍微调整字号 */
      font-weight: bold;
      color: #00ffcc;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(0, 255, 204, 0.1);
      border-radius: 8px;
      text-align: center;
    }
    
    .legend {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap; /* 关键：屏幕太小时自动折行 */
      font-size: 13px;
      color: #ccc;
      line-height: 1.8;
      text-align: left;
    }
    
    .legend div.column { width: 48%; }
    .legend b.title { color: #00ffcc; font-size: 15px; margin-bottom: 5px; display: block; }
    .legend b { color: white; }

    /* 如果屏幕宽度小于 500px (绝大部分手机)，将两列变为上下两行显示，防止文字拥挤 */
    @media (max-width: 500px) {
      .legend div.column { width: 100%; margin-bottom: 10px; }
    }
  </style>
</head>
<body>

  <h2>🚁 手势控制无人机模拟器</h2>

  <div id="controls-container">
    <button id="start-btn">启动视觉引擎 (点此授权摄像头)</button>
  </div>

  <div id="video-container" style="display: none;">
    <video id="input_video" width="640" height="480" autoplay playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
  </div>

  <div id="ui-panel" style="display: none;">
    <div id="status_text" class="status">👀 正在加载 AI 模型...</div>
    
    <div class="legend">
      <div class="column">
        <b class="title">基础控制：</b>
        🖐️ <b>张开手掌 (5指)：</b> 起飞 / 悬停<br>
        ✊ <b>握紧拳头 (0指)：</b> 一键降落 / 急停
      </div>
      
      <div class="column">
        <b class="title">飞行方向 (起飞后伸出食指)：</b>
        ☝️ <b>向上指：</b> 上升 &nbsp;&nbsp; 👇 <b>向下指：</b> 下降<br>
        👈 <b>向左指：</b> 左飞 &nbsp;&nbsp; 👉 <b>向右指：</b> 右飞
      </div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status_text');
    const startBtn = document.getElementById('start-btn');
    const videoContainer = document.getElementById('video-container');
    const uiPanel = document.getElementById('ui-panel');

    // 物理引擎
    let drone = { x: 320, y: 440, vx: 0, vy: 0, state: 'landed', propAngle: 0 };
    const maxSpeed = 9;
    const acceleration = 0.9;
    const friction = 0.85;

    let currentGesture = "NONE";
    let lastVideoFrame = null;
    let currentLandmarks = null;

    function detectGesture(landmarks) {
      const tips = [8, 12, 16, 20]; 
      const pips = [6, 10, 14, 18];
      let extendedFingers = 0;
      let isIndexExtended = false;

      for (let i = 0; i < 4; i++) {
        let tipDist = Math.hypot(landmarks[tips[i]].x - landmarks[0].x, landmarks[tips[i]].y - landmarks[0].y);
        let pipDist = Math.hypot(landmarks[pips[i]].x - landmarks[0].x, landmarks[pips[i]].y - landmarks[0].y);
        if (tipDist > pipDist) {
          extendedFingers++;
          if (i === 0) isIndexExtended = true; 
        }
      }

      if (extendedFingers === 0) return { cmd: "LAND", text: "✊ 已识别：握紧拳头 (LAND)" };
      if (extendedFingers >= 3) return { cmd: "HOVER", text: "🖐️ 已识别：张开手掌 (HOVERING)" };

      if (extendedFingers === 1 && isIndexExtended) {
        let dx = landmarks[8].x - landmarks[5].x;
        let dy = landmarks[8].y - landmarks[5].y;
        if (Math.abs(dy) > Math.abs(dx)) {
          return dy < 0 ? { cmd: "UP", text: "☝️ 已识别：向上升 (ASCEND)" } : { cmd: "DOWN", text: "👇 已识别：向下飞 (DESCEND)" };
        } else {
          return dx < 0 ? { cmd: "RIGHT", text: "👉 已识别：向右飞 (RIGHT)" } : { cmd: "LEFT", text: "👈 已识别：向左飞 (LEFT)" };
        }
      }
      return { cmd: "NONE", text: "👀 请将手移入镜头..." };
    }

    function onResults(results) {
      lastVideoFrame = results.image;
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        currentLandmarks = results.multiHandLandmarks[0];
        let gestureData = detectGesture(currentLandmarks);
        currentGesture = gestureData.cmd;
        
        if (gestureData.cmd === "LAND") statusText.style.color = "#ff4444";
        else if (gestureData.cmd === "HOVER") statusText.style.color = "#00ffcc";
        else statusText.style.color = "#ffff00";
        statusText.innerHTML = gestureData.text;
      } else {
        currentLandmarks = null;
        currentGesture = "NONE";
        statusText.innerHTML = "👀 未检测到手势，无人机待命...";
        statusText.style.color = "#aaaaaa";
      }
    }

    function gameLoop() {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      if (lastVideoFrame) {
        canvasCtx.save();
        // 镜像翻转，像照镜子一样
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        canvasCtx.drawImage(lastVideoFrame, 0, 0, canvasElement.width, canvasElement.height);
        
        // 【关键要求保留】绘制红点和绿线
        if (currentLandmarks) {
          drawConnectors(canvasCtx, currentLandmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
          drawLandmarks(canvasCtx, currentLandmarks, {color: '#FF0000', lineWidth: 2, radius: 4});
        }
        canvasCtx.restore();
      }

      if (['HOVER', 'UP', 'DOWN', 'LEFT', 'RIGHT'].includes(currentGesture)) {
        drone.state = 'flying';
      } else if (currentGesture === 'LAND') {
        drone.state = 'landed';
      }

      if (drone.state === 'flying') {
        drone.propAngle += 0.8; 
        if (currentGesture === 'UP') drone.vy -= acceleration;
        if (currentGesture === 'DOWN') drone.vy += acceleration;
        if (currentGesture === 'LEFT') drone.vx -= acceleration;
        if (currentGesture === 'RIGHT') drone.vx += acceleration;
      } else {
        drone.propAngle += 0.05; 
        drone.vy += 1; 
      }

      drone.vx *= friction;
      drone.vy *= friction;
      drone.vx = Math.max(-maxSpeed, Math.min(maxSpeed, drone.vx));
      drone.vy = Math.max(-maxSpeed, Math.min(maxSpeed, drone.vy));
      drone.x += drone.vx;
      drone.y += drone.vy;

      const groundY = canvasElement.height - 30;
      if (drone.x < 40) { drone.x = 40; drone.vx = 0; }
      if (drone.x > canvasElement.width - 40) { drone.x = canvasElement.width - 40; drone.vx = 0; }
      if (drone.y < 40) { drone.y = 40; drone.vy = 0; }
      if (drone.y > groundY) { 
        drone.y = groundY; drone.vy = 0; 
        if(drone.state === 'landed') drone.vx *= 0.5; 
      }

      drawDrone(canvasCtx, drone);
      requestAnimationFrame(gameLoop);
    }

    function drawDrone(ctx, d) {
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.vx * 0.05);
      
      ctx.strokeStyle = '#eeeeee';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-35, -20); ctx.lineTo(35, 20);
      ctx.moveTo(-35, 20); ctx.lineTo(35, -20);
      ctx.stroke();
      
      const propRadius = d.state === 'flying' ? 18 : 15;
      ctx.fillStyle = d.state === 'flying' ? 'rgba(0, 255, 204, 0.6)' : 'rgba(150, 150, 150, 0.4)';
      const centers = [[-35, -20], [35, 20], [-35, 20], [35, -20]];
      centers.forEach(c => {
        ctx.save();
        ctx.translate(c[0], c[1]);
        ctx.rotate(d.propAngle);
        ctx.beginPath();
        ctx.ellipse(0, 0, propRadius, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
      
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(0, 0, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = d.state === 'flying' ? '#ff0055' : '#444'; 
      ctx.beginPath();
      ctx.arc(0, -10, 4, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }

    // 手机端关键逻辑：等待用户点击按钮后再请求摄像头权限
    startBtn.addEventListener('click', () => {
      document.getElementById('controls-container').style.display = 'none';
      videoContainer.style.display = 'block';
      uiPanel.style.display = 'block';
      statusText.innerHTML = "⏳ 正在初始化摄像头与 AI 引擎...";

      const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }});
      
      hands.setOptions({
        maxNumHands: 1, 
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
      });
      hands.onResults(onResults);

      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await hands.send({image: videoElement});
        },
        width: 640,
        height: 480,
        facingMode: "user" // 【手机端要求】强制调用前置自拍摄像头
      });
      
      camera.start().then(() => {
        requestAnimationFrame(gameLoop);
      }).catch((err) => {
        statusText.innerHTML = "⚠️ 无法开启摄像头，请检查权限！";
        statusText.style.color = "#ff4444";
      });
    });

  </script>
</body>
</html>
