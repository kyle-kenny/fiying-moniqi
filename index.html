<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 手势控制无人机 (手机版)</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #1a1a1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow-x: hidden; /* 防止手机端横向滚动出现白边 */
    }
    
    h2 { 
      font-size: 1.2rem; 
      text-align: center; 
      margin: 15px 0 10px 0; 
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); 
    }
    
    /* 视频容器适配 */
    #video-container {
      width: 95%; /* 在手机上占满大部分屏幕宽度 */
      max-width: 640px; /* 在电脑上限制最大宽度 */
      position: relative;
      background: #000;
      border-radius: 12px;
      padding: 5px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      box-sizing: border-box; /* 确保 padding 不会撑破宽度 */
    }
    
    video { display: none; }
    
    /* 画布自适应容器宽度 */
    canvas {
      width: 100%; 
      height: auto;
      border-radius: 8px;
      background-color: #222;
      display: block; /* 移除底部空白间隙 */
    }
    
    /* 底部面板适配 */
    #ui-panel {
      width: 95%;
      max-width: 640px;
      margin-top: 15px;
      background: #2c2c2c;
      padding: 15px;
      border-radius: 12px;
      box-sizing: border-box;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    
    .status {
      font-size: 1.2rem;
      font-weight: bold;
      color: #00ffcc;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(0, 255, 204, 0.1);
      border-radius: 8px;
      text-align: center;
    }
    
    .legend {
      display: flex;
      flex-direction: column; /* 手机端改为上下竖排显示说明，避免拥挤 */
      font-size: 13px;
      color: #ccc;
      line-height: 1.6;
    }
    
    .legend div { 
      width: 100%; 
      margin-bottom: 8px; 
    }
    
    /* 开始按钮样式 (用于触发摄像头权限) */
    #start-btn {
      margin-top: 10px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      color: #1a1a1a;
      background-color: #00ffcc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
    }
    #start-btn:active {
      transform: scale(0.98);
    }
    #controls-container {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h2>🚁 隔空御物：无人机 (手机版)</h2>

  <div id="controls-container">
    <button id="start-btn">启动摄像头并连接 AI</button>
  </div>

  <div id="video-container" style="display: none;">
    <video id="input_video" width="640" height="480" autoplay playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
  </div>

  <div id="ui-panel" style="display: none;">
    <div id="status_text" class="status">正在加载 AI 视觉引擎...</div>
    <div class="legend">
      <div>
        <b>基础控制：</b><br>
        🖐️ 张开手掌：起飞/悬停 &nbsp;&nbsp; ✊ 握紧拳头：降落
      </div>
      <div>
        <b>飞行方向 (起飞后伸出食指)：</b><br>
        ☝️ 向上 &nbsp; 👇 向下 &nbsp; 👈 向左 &nbsp; 👉 向右
      </div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status_text');
    const startBtn = document.getElementById('start-btn');
    const videoContainer = document.getElementById('video-container');
    const uiPanel = document.getElementById('ui-panel');

    // ==========================================
    // 无人机物理引擎 (参数略微调整以适应手机视距)
    // ==========================================
    let drone = {
      x: 320, y: 440,
      vx: 0, vy: 0,
      state: 'landed',
      propAngle: 0
    };
    const maxSpeed = 10; // 手机上稍微飞快一点
    const acceleration = 1.0;
    const friction = 0.85;

    // ==========================================
    // 视觉与识别变量
    // ==========================================
    let currentGesture = "NONE";
    let lastVideoFrame = null;
    let currentLandmarks = null;

    function detectGesture(landmarks) {
      const tips = [8, 12, 16, 20]; 
      const pips = [6, 10, 14, 18];
      
      let extendedFingers = 0;
      let isIndexExtended = false;

      for (let i = 0; i < 4; i++) {
        let tipDist = Math.hypot(landmarks[tips[i]].x - landmarks[0].x, landmarks[tips[i]].y - landmarks[0].y);
        let pipDist = Math.hypot(landmarks[pips[i]].x - landmarks[0].x, landmarks[pips[i]].y - landmarks[0].y);
        
        if (tipDist > pipDist) {
          extendedFingers++;
          if (i === 0) isIndexExtended = true;
        }
      }

      if (extendedFingers === 0) return { cmd: "LAND", text: "✊ 降落 (Landed)" };
      if (extendedFingers >= 3) return { cmd: "HOVER", text: "🖐️ 悬停 (Hovering)" };

      if (extendedFingers === 1 && isIndexExtended) {
        let dx = landmarks[8].x - landmarks[5].x;
        let dy = landmarks[8].y - landmarks[5].y;
        
        if (Math.abs(dy) > Math.abs(dx)) {
          return dy < 0 ? { cmd: "UP", text: "☝️ 向上升 (Ascend)" } : { cmd: "DOWN", text: "👇 向下飞 (Descend)" };
        } else {
          return dx < 0 ? { cmd: "RIGHT", text: "👉 向右飞 (Right)" } : { cmd: "LEFT", text: "👈 向左飞 (Left)" };
        }
      }

      return { cmd: "NONE", text: "🤔 等待指令..." };
    }

    function onResults(results) {
      lastVideoFrame = results.image;
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        currentLandmarks = results.multiHandLandmarks[0];
        let gestureData = detectGesture(currentLandmarks);
        currentGesture = gestureData.cmd;
        
        if (gestureData.cmd === "LAND") statusText.style.color = "#ff4444";
        else if (gestureData.cmd === "HOVER") statusText.style.color = "#00ffcc";
        else statusText.style.color = "#ffff00";
        
        statusText.innerHTML = gestureData.text;
      } else {
        currentLandmarks = null;
        currentGesture = "NONE";
        statusText.innerHTML = "👀 请将手移入镜头...";
        statusText.style.color = "#aaaaaa";
      }
    }

    // ==========================================
    // 渲染循环
    // ==========================================
    function gameLoop() {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      if (lastVideoFrame) {
        canvasCtx.save();
        
        // 镜像翻转
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        
        canvasCtx.drawImage(lastVideoFrame, 0, 0, canvasElement.width, canvasElement.height);
        
        // 绘制红点绿线
        if (currentLandmarks) {
          drawConnectors(canvasCtx, currentLandmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
          drawLandmarks(canvasCtx, currentLandmarks, {color: '#FF0000', lineWidth: 2, radius: 4});
        }
        
        canvasCtx.restore();
      }

      // 更新无人机物理
      if (['HOVER', 'UP', 'DOWN', 'LEFT', 'RIGHT'].includes(currentGesture)) {
        drone.state = 'flying';
      } else if (currentGesture === 'LAND') {
        drone.state = 'landed';
      }

      if (drone.state === 'flying') {
        drone.propAngle += 0.8; 
        if (currentGesture === 'UP') drone.vy -= acceleration;
        if (currentGesture === 'DOWN') drone.vy += acceleration;
        if (currentGesture === 'LEFT') drone.vx -= acceleration;
        if (currentGesture === 'RIGHT') drone.vx += acceleration;
      } else {
        drone.propAngle += 0.05; 
        drone.vy += 1.5; // 增加重力感
      }

      drone.vx *= friction;
      drone.vy *= friction;
      drone.vx = Math.max(-maxSpeed, Math.min(maxSpeed, drone.vx));
      drone.vy = Math.max(-maxSpeed, Math.min(maxSpeed, drone.vy));
      drone.x += drone.vx;
      drone.y += drone.vy;

      const groundY = canvasElement.height - 30;
      if (drone.x < 40) { drone.x = 40; drone.vx = 0; }
      if (drone.x > canvasElement.width - 40) { drone.x = canvasElement.width - 40; drone.vx = 0; }
      if (drone.y < 40) { drone.y = 40; drone.vy = 0; }
      if (drone.y > groundY) { 
        drone.y = groundY; 
        drone.vy = 0; 
        if(drone.state === 'landed') drone.vx *= 0.5; 
      }

      drawDrone(canvasCtx, drone);
      requestAnimationFrame(gameLoop);
    }

    function drawDrone(ctx, d) {
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.vx * 0.06); // 稍微增加倾斜度
      
      ctx.strokeStyle = '#eeeeee';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-35, -20); ctx.lineTo(35, 20);
      ctx.moveTo(-35, 20); ctx.lineTo(35, -20);
      ctx.stroke();
      
      const propRadius = d.state === 'flying' ? 18 : 15;
      ctx.fillStyle = d.state === 'flying' ? 'rgba(0, 255, 204, 0.6)' : 'rgba(150, 150, 150, 0.4)';
      const centers = [[-35, -20], [35, 20], [-35, 20], [35, -20]];
      centers.forEach(c => {
        ctx.save();
        ctx.translate(c[0], c[1]);
        ctx.rotate(d.propAngle);
        ctx.beginPath();
        ctx.ellipse(0, 0, propRadius, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
      
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(0, 0, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = d.state === 'flying' ? '#ff0055' : '#444'; 
      ctx.beginPath();
      ctx.arc(0, -10, 4, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }

    // ==========================================
    // 启动逻辑处理 (适配手机浏览器的限制)
    // ==========================================
    startBtn.addEventListener('click', () => {
      // 隐藏按钮，显示主界面
      document.getElementById('controls-container').style.display = 'none';
      videoContainer.style.display = 'block';
      uiPanel.style.display = 'block';

      // 初始化模型
      const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }});
      
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
      });
      hands.onResults(onResults);

      // 设置手机摄像头，优先调用前置摄像头
      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await hands.send({image: videoElement});
        },
        width: 640,
        height: 480,
        facingMode: "user" // 强制要求前置自拍摄像头
      });
      
      camera.start()
        .then(() => {
          requestAnimationFrame(gameLoop);
        })
        .catch((error) => {
          console.error("摄像头启动失败:", error);
          statusText.innerHTML = "⚠️ 无法访问摄像头，请检查浏览器权限设置！";
          statusText.style.color = "#ff4444";
        });
    });

  </script>
</body>
</html>
