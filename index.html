<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>万剑归宗无人机 (1.1.1)</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.0/umd/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>

  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
    h2 { font-size: 1.2rem; text-align: center; margin: 15px 0 10px 0; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
    #start-btn { margin-top: 20px; padding: 15px 30px; font-size: 18px; font-weight: bold; color: #1a1a1a; background-color: #00ffcc; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }
    #start-btn:active { transform: scale(0.95); }
    #start-btn:disabled { background-color: #555; color: #999; cursor: not-allowed; box-shadow: none; }
    #controls-container { display: flex; justify-content: center; width: 100%; margin-bottom: 10px; }
    
    #video-container { width: 95%; max-width: 640px; height: 480px; position: relative; background: #000; border-radius: 12px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); display: none; overflow: hidden; }
    video { display: none; }
    #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    #three_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    
    #ui-panel { width: 95%; max-width: 640px; margin-top: 15px; background: #2c2c2c; padding: 15px 20px; border-radius: 12px; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: none; }
    .status { font-size: 1.2rem; font-weight: bold; color: #00ffcc; margin-bottom: 15px; padding: 10px; background: rgba(0, 255, 204, 0.1); border-radius: 8px; text-align: center; word-wrap: break-word; }
    
    .legend { display: flex; justify-content: space-between; flex-wrap: wrap; font-size: 13px; color: #ccc; line-height: 1.8; text-align: left; }
    .legend div.column { width: 48%; }
    .legend b.title { color: #00ffcc; font-size: 15px; margin-bottom: 5px; display: block; }
    .legend b { color: white; }
    .warning-note { margin-top: 15px; font-size: 12px; color: #ffaa00; text-align: center; font-weight: bold; }
    @media (max-width: 500px) { .legend div.column { width: 100%; margin-bottom: 10px; } }
  </style>
</head>
<body>

  <h2>🚁 万剑归宗无人机</h2>

  <div id="controls-container">
    <button id="start-btn">启动视觉引擎</button>
  </div>

  <div id="video-container">
    <video id="input_video" width="640" height="480" autoplay playsinline muted></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    <canvas id="three_canvas" width="640" height="480"></canvas>
  </div>

  <div id="ui-panel">
    <div id="status_text" class="status">👀 等待启动...</div>
    <div class="legend">
      <div class="column">
        <b class="title">基础控制：</b>
        🖐️ <b>手心朝前张开：</b> 悬停待命<br>
        ✊ <b>握紧拳头 (0指)：</b> 降落急停
      </div>
      <div class="column">
        <b class="title">特技 & 方向：</b>
        ☝️ <b>食指指向上/下/左/右：</b> 无人机移动<br>
        🫲 <b>瞬间翻转手腕：</b> 触发单次侧方翻滚
      </div>
    </div>
    <div class="warning-note">⚠️ 提示：手机端模型下载及初始化可能需要 1-3 分钟！</div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvas2d = document.getElementById('output_canvas');
    const ctx2d = canvas2d.getContext('2d');
    const canvas3d = document.getElementById('three_canvas');
    const statusText = document.getElementById('status_text');
    const startBtn = document.getElementById('start-btn');

    // 初始化 3D 渲染器
    const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, alpha: true, antialias: true });
    renderer.setSize(640, 480);
    // 【修复核心2】：限制手机端最高像素比例，防止内存崩溃
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(0, 640, 0, 480, -1000, 1000);
    camera.position.z = 500;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(200, 500, 300);
    scene.add(directionalLight);

    let drone3DModel = null;
    let propellers = [];
    let isModelLoaded = false;

    // ==========================================
    // 加载管理器 (新增：用于显示手机端的下载进度)
    // ==========================================
    const manager = new THREE.LoadingManager();
    manager.onStart = function ( url, itemsLoaded, itemsTotal ) {
      startBtn.innerText = "⏳ 正在下载 3D 模型...";
      startBtn.disabled = true;
    };
    manager.onProgress = function ( url, itemsLoaded, itemsTotal ) {
      // 在按钮上实时显示下载百分比
      startBtn.innerText = `⏳ 模型下载中: ${Math.round((itemsLoaded / itemsTotal) * 100)}%`;
    };
    manager.onLoad = function ( ) {
      startBtn.innerText = "✅ 模型就绪，点击启动";
      startBtn.disabled = false;
      isModelLoaded = true;
    };
    manager.onError = function ( url ) {
      startBtn.innerText = "❌ 模型加载失败";
      alert("模型文件读取失败，请检查网络或确认 my_drone.fbx 文件名大小写完全匹配！");
    };

    // 提前触发模型加载
    const loader = new THREE.FBXLoader(manager);
    loader.load('my_drone.fbx', function (object) {
      drone3DModel = object;
      drone3DModel.scale.set(0.15, 0.15, 0.15); 
      drone3DModel.traverse(function (child) {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.name.toLowerCase().includes("propeller")) propellers.push(child);
        }
      });
      scene.add(drone3DModel);
      
      // 【修复核心3】：即便还没开启摄像头，先强制渲染一帧，让无人机立刻显示出来
      drone3DModel.position.set(320, 240, 0); 
      renderer.render(scene, camera);

    }, undefined, function (error) {
      console.error('FBX 加载错误详情:', error);
    });

    let dronePhys = { 
      x: 320, y: 440, vx: 0, vy: 0, state: 'landed',
      flipAngle: 0, isFlipping: false, flipDirection: 1,
      canTriggerNewFlip: true 
    };
    const maxSpeed = 12, acceleration = 1.0, friction = 0.85;
    let currentGesture = "NONE", lastVideoFrame = null, currentLandmarks = null;

    function detectGesture(landmarks) {
      const tips = [8, 12, 16, 20], pips = [6, 10, 14, 18];
      let extendedFingers = 0, isIndexExtended = false;

      for (let i = 0; i < 4; i++) {
        let tipDist = Math.hypot(landmarks[tips[i]].x - landmarks[0].x, landmarks[tips[i]].y - landmarks[0].y);
        let pipDist = Math.hypot(landmarks[pips[i]].x - landmarks[0].x, landmarks[pips[i]].y - landmarks[0].y);
        if (tipDist > pipDist) { extendedFingers++; if (i === 0) isIndexExtended = true; }
      }

      let palmSlopeX = landmarks[17].x - landmarks[5].x; 
      
      if (extendedFingers === 0) return { cmd: "LAND", text: "✊ 已识别：握紧拳头 (降落)" };
      
      if (extendedFingers >= 4) {
        if (palmSlopeX > 0.15) return { cmd: "FLIP_LEFT", text: "🫲 已识别：向左翻腕 (单次侧翻)" };
        if (palmSlopeX < -0.15) return { cmd: "FLIP_RIGHT", text: "🫱 已识别：向右翻腕 (单次侧翻)" };
        return { cmd: "HOVER", text: "🖐️ 已识别：手心张开 (悬停)" };
      }

      if (extendedFingers === 1 && isIndexExtended) {
        let dx = landmarks[8].x - landmarks[5].x; 
        let dy = landmarks[8].y - landmarks[5].y;
        if (Math.abs(dy) > Math.abs(dx)) {
          return dy < 0 ? { cmd: "UP", text: "☝️ 已识别：指尖朝上 (上升)" } : { cmd: "DOWN", text: "👇 已识别：指尖朝下 (下降)" };
        } else {
          return dx < 0 ? { cmd: "RIGHT", text: "👉 向右飞" } : { cmd: "LEFT", text: "👈 向左飞" };
        }
      }
      return { cmd: "NONE", text: "👀 请将手移入镜头..." };
    }

    function onResults(results) {
      lastVideoFrame = results.image;
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        currentLandmarks = results.multiHandLandmarks[0];
        let gestureData = detectGesture(currentLandmarks);
        currentGesture = gestureData.cmd;
        
        if (gestureData.cmd === "LAND") statusText.style.color = "#ff4444";
        else if (["HOVER", "FLIP_LEFT", "FLIP_RIGHT"].includes(gestureData.cmd)) statusText.style.color = "#00ffcc";
        else statusText.style.color = "#ffff00";
        statusText.innerHTML = gestureData.text;
      } else {
        currentLandmarks = null; currentGesture = "NONE";
        statusText.innerHTML = "👀 未检测到手势，无人机待命...";
        statusText.style.color = "#aaaaaa";
      }
    }

    function gameLoop() {
      ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
      if (lastVideoFrame) {
        ctx2d.save();
        ctx2d.translate(canvas2d.width, 0); ctx2d.scale(-1, 1);
        ctx2d.drawImage(lastVideoFrame, 0, 0, canvas2d.width, canvas2d.height);
        if (currentLandmarks) {
          drawConnectors(ctx2d, currentLandmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
          drawLandmarks(ctx2d, currentLandmarks, {color: '#FF0000', lineWidth: 2, radius: 4});
        }
        ctx2d.restore();
      }

      if (['HOVER', 'UP', 'DOWN', 'LEFT', 'RIGHT', 'FLIP_LEFT', 'FLIP_RIGHT'].includes(currentGesture)) dronePhys.state = 'flying';
      else if (currentGesture === 'LAND') dronePhys.state = 'landed';

      if ((currentGesture === 'FLIP_LEFT' || currentGesture === 'FLIP_RIGHT') 
          && !dronePhys.isFlipping && dronePhys.canTriggerNewFlip && dronePhys.y < canvas2d.height - 150) {
        dronePhys.isFlipping = true;
        dronePhys.canTriggerNewFlip = false; 
        dronePhys.flipDirection = (currentGesture === 'FLIP_LEFT') ? -1 : 1;
      }

      if (currentGesture === 'HOVER' && !dronePhys.isFlipping) dronePhys.canTriggerNewFlip = true;

      if (dronePhys.isFlipping) {
        dronePhys.flipAngle += 0.45; 
        if (dronePhys.flipAngle >= Math.PI * 2) { 
            dronePhys.flipAngle = 0; dronePhys.isFlipping = false; 
        }
      }

      if (dronePhys.state === 'flying') {
        if (currentGesture === 'UP') dronePhys.vy -= acceleration;
        if (currentGesture === 'DOWN') dronePhys.vy += acceleration;
        if (currentGesture === 'LEFT') dronePhys.vx -= acceleration;
        if (currentGesture === 'RIGHT') dronePhys.vx += acceleration;
        if (dronePhys.isFlipping) dronePhys.vy -= acceleration * 0.6; 
      } else { 
        dronePhys.vy += 1; 
      }

      dronePhys.vx *= friction; dronePhys.vy *= friction;
      dronePhys.vx = Math.max(-maxSpeed, Math.min(maxSpeed, dronePhys.vx));
      dronePhys.vy = Math.max(-maxSpeed, Math.min(maxSpeed, dronePhys.vy));
      dronePhys.x += dronePhys.vx; dronePhys.y += dronePhys.vy;

      const groundY = canvas2d.height - 50;
      if (dronePhys.x < 40) { dronePhys.x = 40; dronePhys.vx = 0; }
      if (dronePhys.x > canvas2d.width - 40) { dronePhys.x = canvas2d.width - 40; dronePhys.vx = 0; }
      if (dronePhys.y < 40) { dronePhys.y = 40; dronePhys.vy = 0; }
      if (dronePhys.y > groundY) { dronePhys.y = groundY; dronePhys.vy = 0; if(dronePhys.state === 'landed') dronePhys.vx *= 0.5; }

      if (drone3DModel) {
        drone3DModel.position.x = dronePhys.x;
        drone3DModel.position.y = dronePhys.y; 
        drone3DModel.rotation.z = (dronePhys.vx * -0.05) + (dronePhys.flipAngle * dronePhys.flipDirection); 
        drone3DModel.rotation.x = 0;

        if (dronePhys.state === 'flying') {
          propellers.forEach((prop, index) => { prop.rotation.y += (index % 2 === 0 ? 0.8 : -0.8); });
        }
      }

      renderer.render(scene, camera);
      requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener('click', () => {
      if (!isModelLoaded) return; // 确保模型加载完才能点

      document.getElementById('controls-container').style.display = 'none';
      document.getElementById('video-container').style.display = 'block';
      document.getElementById('ui-panel').style.display = 'block';
      statusText.innerHTML = "⏳ 正在初始化摄像头与 AI 引擎...";

      const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
      hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
      hands.onResults(onResults);

      const cameraObj = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480, facingMode: "user" 
      });
      
      cameraObj.start().then(() => {
        // 摄像头启动成功，进入循环
        requestAnimationFrame(gameLoop);
      }).catch(err => { 
        statusText.innerHTML = "⚠️ 无法开启摄像头，请在手机设置中允许网页访问摄像头！"; 
        statusText.style.color = "#ff4444"; 
      });
      
      // 【修复核心4】：无论摄像头有没有立即成功，先开启物理和渲染循环
      // 防止因为某些手机摄像头调起慢，导致画面一直黑屏
      requestAnimationFrame(gameLoop);
    });
  </script>
</body>
</html>
